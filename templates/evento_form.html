{% extends 'base.html' %}

{% block title %}{% if evento %}Editar{% else %}Agregar{% endif %} Evento · Admin{% endblock %}

{% block content %}

<section class="dashboard">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-calendar"></i> {% if evento %}Editar{% else %}Agregar{% endif %} Evento</h1>
            <a href="{{ url_for('admin_eventos') }}" class="btn-logout">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <div class="admin-form">
            <form method="POST">
                <div class="form-group">
                    <label>Nombre del evento</label>
                    <input type="text" name="nombre_evento" required placeholder="Ej. Feria de comida de Quebec" value="{{ evento.nombre_evento if evento else '' }}">
                </div>
                <div class="form-group">
                    <label>Ubicación</label>
                    <input type="text" name="ubicacion" required placeholder="Ej. Place George-V, Quebec" value="{{ evento.ubicacion if evento else '' }}">
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" name="fecha" required value="{{ evento.fecha if evento else '' }}">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Hora inicio</label>
                        <input type="time" name="hora_inicio" value="{{ evento.hora_inicio if evento else '' }}">
                    </div>
                    <div class="form-group">
                        <label>Hora fin</label>
                        <input type="time" name="hora_fin" value="{{ evento.hora_fin if evento else '' }}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notas (opcional)</label>
                    <textarea name="notas" rows="2">{{ evento.notas if evento else '' }}</textarea>
                </div>

                <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top: 1rem;">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </form>
        </div>
    </div>
</section>

{% endblock %}
