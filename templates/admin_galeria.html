{% extends 'base.html' %}

{% block title %}Galería de Fotos · Admin{% endblock %}

{% block content %}

<section class="dashboard">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-images"></i> Galería de Fotos</h1>
            <a href="{{ url_for('dashboard') }}" class="btn-logout">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>

        <div class="admin-form">
            <form method="POST" action="{{ url_for('galeria_foto_subir') }}" enctype="multipart/form-data">
                <div class="form-group">
                    <input type="file" name="imagen" accept="image/*" required>
                </div>
                <div class="form-group">
                    <input type="text" name="descripcion" placeholder="Descripción (opcional)">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-plus"></i> Agregar Foto
                </button>
            </form>
        </div>

        <div class="galeria-admin-grid">
            {% for foto in fotos %}
            <div class="galeria-admin-item">
                <img src="{{ foto.imagen }}">
                <a href="{{ url_for('galeria_foto_eliminar', id=foto.id) }}" class="btn-eliminar-foto" onclick="return confirm('¿Eliminar esta foto?')">
                    <i class="fas fa-times"></i>
                </a>
            </div>
            {% endfor %}
        </div>

        {% if not fotos %}
            <p style="text-align:center; color: var(--gris); padding: 2rem;">Aún no hay fotos en la galería.</p>
        {% endif %}
    </div>
</section>

{% endblock %}
